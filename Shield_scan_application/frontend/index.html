// ── API Fetch Helper with 401 handling ────────────────────────────────────────
const apiFetch = async (path, options = {}, token = null) => {
  const headers = {
    "Content-Type": "application/json",
    ...(options.headers || {})
  };
  if (token) {
    headers["Authorization"] = `Bearer ${token}`;
  }
  
  const response = await fetch(`${API}${path}`, {
    ...options,
    headers
  });
  
  if (response.status === 401) {
    throw new Error("UNAUTHORIZED");
  }
  
  if (!response.ok) {
    const errText = await response.text();
    let detail = "Request failed";
    try {
      const errJson = JSON.parse(errText);
      detail = errJson.detail || detail;
    } catch(e) {}
    throw new Error(detail);
  }
  
  if (response.status === 204) return null;
  return response.json();
};

function SignupPage({ onSignup, onGoLogin, showToast }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pwd, setPwd] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!name || !email || !pwd) { showToast("Please fill in all required fields."); return; }
    if (pwd.length < 8) { showToast("Password must be at least 8 characters."); return; }
    setLoading(true);
    try {
      const data = await apiFetch("/api/auth/register", {
        method: "POST",
        body: JSON.stringify({ email, password: pwd, full_name: name })
      });
      onSignup(data.access_token);
    } catch(err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (

// ── AWS CONNECT WIZARD ────────────────────────────────────────────────────────
function AWSConnect({ userProfile, onUpdateProfile, showToast, fetchWithAuth }) {
  const [step, setStep] = useState(1);
  const [ak, setAk] = useState("");
  const [sk, setSk] = useState("");
  const [region, setRegion] = useState("us-east-1");
  const [loading, setLoading] = useState(false);

  const connect = async () => {
    if (!ak || !sk) {
      showToast("Access Key and Secret Key are required.");
      return;
    }
    setLoading(true);
    try {
      await fetchWithAuth("/api/auth/aws", {
        method: "PUT",
        body: JSON.stringify({ aws_access_key: ak, aws_secret_key: sk, aws_region: region })
      });
      // reload profile
      const prof = await fetchWithAuth("/api/auth/me");
      onUpdateProfile(prof);
      setStep(3);
    } catch(err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  };

  const disconnect = async () => {
    setLoading(true);
    try {
      await fetchWithAuth("/api/auth/aws", { method: "DELETE" });
      const prof = await fetchWithAuth("/api/auth/me");
      onUpdateProfile(prof);
      setStep(1);
      setAk("");
      setSk("");
    } catch(err) {
      showToast(err.message);
    } finally {
      setLoading(false);
    }
  };

  if (userProfile.aws_connected) {
    return (
      <div className="bg-white rounded-xl border border-slate-200/80 shadow-sm p-6 max-w-lg">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold">✓</div>
          <div>
            <h3 className="font-bold text-slate-800 text-sm">AWS Account Connected</h3>
            <p className="text-xs text-slate-400 font-mono mt-0.5">Region: {userProfile.aws_region || "us-east-1"}</p>
          </div>
        </div>
        <button onClick={disconnect} disabled={loading}
          className="px-4 py-2 border-2 border-red-200 text-red-600 rounded-lg text-xs font-bold hover:bg-red-50 disabled:opacity-50 transition-colors">
          {loading ? "Disconnecting..." : "Disconnect AWS Account"}
        </button>
      </div>
    );
  }

  return (
    <div className="max-w-2xl bg-white rounded-xl border border-slate-200/80 shadow-sm p-6">
      <h3 className="font-bold text-slate-800 text-base mb-1">AWS Connection Wizard</h3>
      <p className="text-xs text-slate-400 mb-6">Integrate your AWS infrastructure for live CSPM misconfiguration analysis.</p>

      {/* Step Tracker */}
      <div className="flex items-center gap-2 mb-8">
        {[1, 2, 3].map((s) => (
          <React.Fragment key={s}>
            <div className="flex items-center gap-2">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 transition-all
                ${s < step ? "bg-brand border-brand text-white"
                  : s === step ? "border-brand text-brand font-extrabold"
                  : "border-slate-200 text-slate-300"}`}>{s}</div>
              <span className={`text-xs font-semibold ${s <= step ? "text-brand" : "text-slate-300"}`}>
                {s === 1 ? "IAM Policy" : s === 2 ? "Credentials" : "Confirmation"}
              </span>
            </div>
            {s < 3 && <div className={`flex-1 h-px ${s < step ? "bg-brand" : "bg-slate-100"}`}/>}
          </React.Fragment>
        ))}
      </div>

      {step === 1 && (
        <div className="space-y-4">
          <p className="text-sm text-slate-500 leading-relaxed">
            ShieldScan requires <strong>read-only security scanning</strong> privileges. Please create an IAM User/Role in AWS Console and attach the standard <code className="bg-slate-100 px-1.5 py-0.5 rounded font-mono text-xs text-slate-700 font-semibold">SecurityAudit</code> managed policy.
          </p>
          <div className="bg-slate-900 rounded-xl p-4 font-mono text-xs text-slate-300 overflow-x-auto border border-slate-800">
            <p className="text-slate-500 font-bold mb-2">// Recommended IAM SecurityAudit JSON policy structure</p>
            <pre className="text-emerald-400">{"{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"iam:GenerateCredentialReport\",\n        \"s3:GetBucketAcl\",\n        \"s3:GetBucketPublicAccessBlock\",\n        \"ec2:DescribeSecurityGroups\",\n        \"rds:DescribeDBInstances\"\n      ],\n      \"Resource\": \"*\"\n    }\n  ]\n}"}</pre>

      {step === 2 && (
        <div className="space-y-4">
          <div>
            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">AWS Access Key ID</label>
            <input type="text" value={ak} onChange={e=>setAk(e.target.value)} placeholder="AKIAIOSFODNN7EXAMPLE"
              className="w-full border border-slate-200 bg-slate-50 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:border-brand focus:bg-white transition-all"/>

              <option value="eu-central-1">eu-central-1 (Frankfurt)</option>
              <option value="ap-southeast-1">ap-southeast-1 (Singapore)</option>

          </div>
          <div className="flex gap-3">
            <button onClick={() => setStep(1)} className="flex-1 py-2.5 border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 transition-colors">Back</button>

              {loading && <Spinner sz={4} white={true}/>}
              {loading ? "Connecting..." : "Connect Credentials"}

          </div>
        </div>
      )}

      {step === 3 && (
        <div className="text-center py-6 space-y-4">
          <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-2xl mx-auto shadow-inner">✓</div>
          <h4 className="font-bold text-slate-800 text-lg">AWS Infrastructure Linked</h4>
          <p className="text-sm text-slate-500 max-w-sm mx-auto">AWS credentials have been encrypted and saved securely. ShieldScan is configured to scan region: <strong>{region}</strong>.</p>

// ── FLOATING CHAT WIDGET ──────────────────────────────────────────────────────
function FloatWidget({ fetchWithAuth, showToast, isPreloaded, preloadedText, clearPreload }) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{ role: "assistant", content: "Quick help - ask me anything about your current scan findings." }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    if (isPreloaded && preloadedText) {
      setOpen(true);
      send(preloadedText);
      clearPreload();
    }
  }, [isPreloaded, preloadedText]);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [msgs, loading]);

  const send = async (overrideText = null) => {
    const text = (overrideText || input).trim();
    if (!text || loading) return;
    setMsgs(p => [...p, { role: "user", content: text }]);
    if (!overrideText) setInput("");
    setLoading(true);
    try {
      const res = await fetchWithAuth("/api/ai/chat", {
        method: "POST",
        body: JSON.stringify({ message: text, include_findings_context: true })
      });
      setMsgs(p => [...p, { role: "assistant", content: res.reply }]);
    } catch(err) {
      showToast(err.message || "Failed to reach AI. Showing offline helper.");
      setMsgs(p => [...p, { role: "assistant", content: "I'm having trouble connecting to the backend. Please check that uvicorn is running." }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3 select-none">
      {open && (
        <div className="w-96 bg-white rounded-2xl border border-slate-200/80 shadow-2xl flex flex-col overflow-hidden" style={{ height: 420 }}>
          <div className="px-4 py-3.5 bg-brand text-white flex items-center justify-between flex-shrink-0">
            <div className="flex items-center gap-2">
              <span className="text-xl">💬</span>
              <div>
                <p className="text-xs font-bold leading-tight">ShieldScan Assistant</p>
                <p className="text-[9px] text-brand-light/70 font-semibold mt-0.5">RAG context connected</p>
              </div>
            </div>
            <button onClick={() => setOpen(false)} className="text-white/70 hover:text-white text-lg font-bold leading-none">&times;</button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 scrollbar min-h-0 bg-slate-50">
            {msgs.map((m, i) => (
              <div key={i} className={`flex gap-2 mb-3.5 ${m.role === "assistant" ? "" : "flex-row-reverse"}`}>
                <div className={`w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-[9px] font-bold shadow-sm
                  ${m.role === "assistant" ? "bg-brand text-white" : "bg-slate-200 text-slate-600"}`}>
                  {m.role === "assistant" ? "AI" : "Me"}
                </div>
                <div className={`max-w-[78%] rounded-2xl px-3 py-2 text-xs leading-relaxed shadow-sm
                  ${m.role === "assistant" ? "bg-white text-slate-700 border border-slate-100" : "bg-brand text-white"}`}>
                  <pre className="whitespace-pre-wrap font-sans text-xs">{m.content}</pre>
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex gap-2 mb-3.5 items-center">
                <div className="w-6 h-6 rounded-full bg-brand flex items-center justify-center text-[9px] font-bold text-white shadow-sm">AI</div>
                <div className="flex items-center gap-2 bg-white rounded-xl px-3 py-2 border border-slate-100 shadow-sm">
                  <Spinner sz={3.5}/><span className="text-xs text-slate-400 font-semibold">AI is analyzing...</span>
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          <div className="px-3.5 py-3 border-t border-slate-100 flex gap-2 flex-shrink-0 bg-white">
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter") send();}}
              placeholder="Ask a quick question..."
              className="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/5 transition-all"/>
            <button onClick={() => send()} disabled={loading || !input.trim()}
              className="px-4 py-2 bg-brand text-white text-xs font-bold rounded-xl hover:bg-brand-hover disabled:opacity-50 transition-colors shadow-sm">
              Send
            </button>
          </div>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)}
        className="w-14 h-14 bg-brand hover:bg-brand-hover text-white rounded-full shadow-2xl flex items-center justify-center text-2xl transition-all hover:scale-105 active:scale-95 border border-brand/20">
        💬
      </button>
    </div>
  );
}

// ── COMPONENT: FINDINGS ──────────────────────────────────────────────────────
function FindingsPage({ findings, onAskAI, fetchWithAuth, showToast }) {
  const [search, setSearch] = useState("");
  const [sevFilter, setSevFilter] = useState("ALL");
  const [typeFilter, setTypeFilter] = useState("ALL");
  const [expandedRow, setExpandedRow] = useState(null);
  
  const [tips, setTips] = useState({});
  const [tipLoading, setTipLoading] = useState({});

  const filtered = useMemo(() => {
    return findings
      .filter(f => sevFilter === "ALL" || f.severity === sevFilter)
      .filter(f => typeFilter === "ALL" || f.finding_type === typeFilter)
      .filter(f => !search || f.title.toLowerCase().includes(search.toLowerCase()) || f.resource.toLowerCase().includes(search.toLowerCase()));
  }, [findings, search, sevFilter, typeFilter]);

  const loadInlineTip = async (f) => {
    if (expandedRow === f.id) {
      setExpandedRow(null);
      return;
    }
    setExpandedRow(f.id);
    if (tips[f.id]) return;
    
    setTipLoading(p => ({ ...p, [f.id]: true }));
    try {
      const res = await fetchWithAuth("/api/ai/chat", {
        method: "POST",
        body: JSON.stringify({
          message: `Provide a numbered 3-step remediation instruction for the finding ${f.id}: "${f.title}" on the resource "${f.resource}". Be direct and concise.`,
          include_findings_context: true
        })
      });
      setTips(p => ({ ...p, [f.id]: res.reply }));
    } catch(err) {
      setTips(p => ({ ...p, [f.id]: "Cannot generate remediation: backend model is unavailable." }));
    } finally {
      setTipLoading(p => ({ ...p, [f.id]: false }));
    }
  };

  return (
    <div className="space-y-4">
      {/* Filters Bar */}
      <div className="bg-white rounded-xl border border-slate-200/80 shadow-sm p-4 flex flex-col md:flex-row gap-4 items-center justify-between">
        <div className="w-full md:w-72">
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search findings title or resources..."
            className="w-full border border-slate-200 bg-slate-50 rounded-lg px-3.5 py-2 text-xs focus:outline-none focus:border-brand focus:bg-white transition-all"/>

// ── COMPONENT: CSPM ──────────────────────────────────────────────────────────
function CSPMPage({ findings }) {
  const [openCard, setOpenCard] = useState("S3");

  const cspm = useMemo(() => {
    return findings.filter(f => f.finding_type === "CSPM");
  }, [findings]);

  // Group by service
  const groups = useMemo(() => {
    const map = {
      S3: { title: "Amazon S3", icon: "🪣", findings: [] },
      IAM: { title: "AWS IAM", icon: "🔑", findings: [] },
      "Security Groups": { title: "EC2 Security Groups", icon: "🛡️", findings: [] },
      RDS: { title: "Amazon RDS", icon: "💾", findings: [] },
      CloudTrail: { title: "AWS CloudTrail", icon: "👣", findings: [] },
      EC2: { title: "Amazon EC2", icon: "💻", findings: [] },
      VPC: { title: "Amazon VPC", icon: "🌐", findings: [] },
      KMS: { title: "AWS KMS", icon: "🔒", findings: [] }
    };
    
    cspm.forEach((f) => {
      const text = f.title.toLowerCase();
      if (text.includes("s3")) map.S3.findings.push(f);
      else if (text.includes("iam") || text.includes("root")) map.IAM.findings.push(f);
      else if (text.includes("security group") || text.includes("sg-") || text.includes("ssh")) map["Security Groups"].findings.push(f);
      else if (text.includes("rds")) map.RDS.findings.push(f);
      else if (text.includes("cloudtrail")) map.CloudTrail.findings.push(f);
      else if (text.includes("ec2") || text.includes("instance")) map.EC2.findings.push(f);
      else if (text.includes("vpc")) map.VPC.findings.push(f);
      else if (text.includes("kms")) map.KMS.findings.push(f);
      else map.IAM.findings.push(f); // default fallback
    });

    return map;
  }, [cspm]);

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <StatCard label="CSPM Findings" value={cspm.length} color="text-slate-800" sub="Posture misconfigurations"/>
        <StatCard label="Critical Issues" value={cspm.filter(f=>f.severity==="CRITICAL").length} color="text-red-600"/>
        <StatCard label="High Issues" value={cspm.filter(f=>f.severity==="HIGH").length} color="text-orange-500"/>
        <StatCard label="Medium Issues" value={cspm.filter(f=>f.severity==="MEDIUM").length} color="text-amber-500"/>
      </div>

      <div className="space-y-3">
        {Object.entries(groups).map(([key, group]) => {
          const count = group.findings.length;
          // Determine worst severity
          let worstSev = "LOW";
          if (group.findings.some(f => f.severity === "CRITICAL")) worstSev = "CRITICAL";
          else if (group.findings.some(f => f.severity === "HIGH")) worstSev = "HIGH";
          else if (group.findings.some(f => f.severity === "MEDIUM")) worstSev = "MEDIUM";

          return (
            <div key={key} className="bg-white rounded-xl border border-slate-200/80 shadow-sm overflow-hidden">
              <button onClick={() => setOpenCard(openCard === key ? null : key)}
                className="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                <div className="flex items-center gap-3">
                  <span className="text-xl leading-none">{group.icon}</span>
                  <span className="font-bold text-slate-800 text-sm">{group.title}</span>
                  {count > 0 && (
                    <span className="text-[10px] font-bold bg-slate-100 border border-slate-200 text-slate-500 px-2 py-0.5 rounded-full ml-1">
                      {count} finding{count > 1 ? "s" : ""}
                    </span>
                  )}
                </div>
                <div className="flex items-center gap-3">
                  {count > 0 ? (
                    <React.Fragment>
                      <span className="text-[10px] font-bold text-slate-400 uppercase">Worst:</span>
                      <Badge s={worstSev}/>
                    </React.Fragment>
                  ) : (
                    <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">Compliant</span>
                  )}
                  <span className="text-slate-300 font-bold ml-2 text-xs">{openCard === key ? "▲" : "▼"}</span>
                </div>
              </button>
              
              {openCard === key && count > 0 && (
                <div className="border-t border-slate-100 bg-slate-50/30 divide-y divide-slate-100">
                  {group.findings.map((f) => (
                    <div key={f.id} className="p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                      <div className="space-y-1">
                        <div className="flex items-center gap-2">
                          <Badge s={f.severity}/>
                          <p className="font-bold text-slate-700 text-xs">{f.title}</p>
                        </div>
                        <p className="text-[10px] text-slate-400 font-mono truncate">{f.resource}</p>
                        <p className="text-[10px] text-brand font-medium">Fix: {f.remediation}</p>
                      </div>
                      <span className="text-[10px] bg-slate-100 border border-slate-200 text-slate-500 px-2 py-0.5 rounded font-mono font-semibold self-start md:self-center">
                        {f.cis_control}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── COMPONENT: COMPLIANCE ─────────────────────────────────────────────────────
function CompliancePage() {
  const [openSec, setOpenSec] = useState("1");
  const [framework, setFramework] = useState("CIS AWS");

  const pass = CIS_CONTROLS.filter(c => c.status === "PASS").length;
  const fail = CIS_CONTROLS.filter(c => c.status === "FAIL").length;
  const unk = CIS_CONTROLS.filter(c => c.status === "UNKNOWN").length;
  const scorePct = Math.round((pass / (pass + fail)) * 100);

  const statusColors = {
    PASS: "bg-emerald-100 text-emerald-800 border-emerald-200",
    FAIL: "bg-red-100 text-red-800 border-red-200",
    UNKNOWN: "bg-slate-100 text-slate-400 border-slate-200"
  };

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div className="bg-white rounded-xl border border-slate-200/80 shadow-sm p-4 flex flex-col items-center justify-center">
          <p className="text-[11px] text-slate-400 uppercase tracking-wider font-semibold mb-2">Compliance Score</p>
          <p className="text-4xl font-extrabold text-brand">{scorePct}%</p>
          <div className="w-full h-1.5 bg-slate-100 rounded-full mt-3 overflow-hidden">
            <div className="h-full bg-brand rounded-full" style={{ width: `${scorePct}%` }}></div>
          </div>
          <p className="text-[9px] text-slate-400 mt-2 font-medium">CIS AWS Benchmark v1.5.0</p>
        </div>
        <StatCard label="Passing Controls" value={pass} color="text-emerald-600" sub="Meets benchmark audits"/>
        <StatCard label="Failing Controls" value={fail} color="text-red-600" sub="Requires remediation"/>
        <StatCard label="Unchecked Controls" value={unk} color="text-slate-400" sub="Manual assessment needed"/>
      </div>

      <div className="flex gap-2 border-b border-slate-200 pb-px">
        {["CIS AWS", "NIST 800-53", "SOC 2", "ISO 27001"].map((fw) => (
          <button key={fw} onClick={() => setFramework(fw)}
            className={`px-4 py-2.5 text-xs font-bold border-b-2 transition-colors select-none
              ${framework === fw ? "border-brand text-brand" : "border-transparent text-slate-400 hover:text-slate-600"}`}>
            {fw}
          </button>
        ))}
      </div>

      {framework !== "CIS AWS" ? (
        <div className="bg-white border border-slate-200/80 p-8 rounded-xl text-center text-xs text-slate-400">
          ⚠️ {framework} compliance validation is a premium feature. Currently showing demo values from CIS AWS Benchmark audits.
        </div>
      ) : (
        <div className="space-y-3">
          {Object.entries(CIS_SECTIONS).map(([sec, sectionTitle]) => {
            const sectionControls = CIS_CONTROLS.filter(c => c.section === sec);
            const passed = sectionControls.filter(c => c.status === "PASS").length;
            const total = sectionControls.filter(c => c.status !== "UNKNOWN").length;

            return (
              <div key={sec} className="bg-white rounded-xl border border-slate-200/80 shadow-sm overflow-hidden">
                <button onClick={() => setOpenSec(openSec === sec ? null : sec)}
                  className="w-full px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-bold text-slate-400 w-5">0{sec}</span>
                    <span className="font-bold text-slate-800 text-sm">{sectionTitle}</span>
                  </div>
                  <div className="flex items-center gap-3.5">
                    <span className="text-[10px] text-slate-400 font-bold">{passed} / {passed + sectionControls.filter(c=>c.status==="FAIL").length} audited pass</span>
                    <span className="text-slate-300 font-bold text-xs">{openSec === sec ? "▲" : "▼"}</span>
                  </div>
                </button>
                
                {openSec === sec && (
                  <div className="border-t border-slate-100 bg-slate-50/20 divide-y divide-slate-100">
                    {sectionControls.map((c) => (
                      <div key={c.id} className="px-5 py-3 flex items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-slate-400 text-[10px] w-12 font-bold">{c.id}</span>
                          <span className="text-slate-600 text-xs font-semibold">{c.title}</span>
                          {c.fid && (
                            <span className="text-[9px] font-mono font-bold bg-amber-50 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded">
                              {c.fid}
                            </span>
                          )}
                        </div>
                        <span className={`inline-block px-2.5 py-0.5 rounded text-[10px] font-bold border ${statusColors[c.status]}`}>
                          {c.status === "UNKNOWN" ? "MANUAL" : c.status}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

                      <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded-full">Secured</span>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function ReportsPage({ findings, stats, showToast }) {
  const [pdfLoading, setPdfLoading] = useState(false);
  const [range, setRange] = useState("30");

  const downloadCSV = () => {
    const headers = ["ID", "Finding Type", "Severity", "Resource", "Title", "Region", "Remediation", "CIS Control"];
    const csvRows = [
      headers.join(","),
      ...findings.map(f => [
        f.id,
        f.finding_type,
        f.severity,
        `"${f.resource.replace(/"/g, '""')}"`,
        `"${f.title.replace(/"/g, '""')}"`,
        f.region,
        `"${(f.fix_recommendation || f.remediation).replace(/"/g, '""')}"`,
        f.cis_control || "N/A"
      ].join(","))
    ].join("\n");

    const blob = new Blob([csvRows], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.setAttribute("download", `shieldscan_findings_report_${range}days.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast("Downloaded CSV report successfully", "info");
  };

  const downloadJSON = () => {
    const reportData = {
      generated_at: new Date().toISOString(),
      date_range_days: parseInt(range),
      stats: stats,
      findings: findings
    };

    const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.setAttribute("download", `shieldscan_findings_report_${range}days.json`);

    link.click();
    document.body.removeChild(link);

// ── COMPONENT: AI ASSISTANT ──────────────────────────────────────────────────
function AIAssistantPage({ fetchWithAuth, showToast }) {
  const [msgs, setMsgs] = useState([
    { role: "assistant", content: "Hello! I am ShieldScan AI. I have loaded your posture findings, container vulnerability records, and CIS AWS benchmarks context.\n\nAsk me how to remediate S3 buckets, delete keys, resolve CVE packages, or secure compliance drift." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  const SUGGESTION_CHIPS = [
    "What are my critical findings?",
    "How do I fix the S3 issue?",
    "Explain my risk score",
    "Show CIS compliance gaps"
  ];

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [msgs, loading]);

  const send = async (overrideText = null) => {
    const text = (overrideText || input).trim();
    if (!text || loading) return;
    setMsgs(p => [...p, { role: "user", content: text }]);
    if (!overrideText) setInput("");
    setLoading(true);
    try {
      const res = await fetchWithAuth("/api/ai/chat", {
        method: "POST",
        body: JSON.stringify({ message: text, include_findings_context: true })
      });
      setMsgs(p => [...p, { role: "assistant", content: res.reply }]);
    } catch(err) {
      showToast(err.message || "Failed to query AI assistant.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="bg-white rounded-xl border border-slate-200/80 shadow-sm flex flex-col h-full min-h-0">
      <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
        <div>
          <h3 className="font-bold text-slate-800 text-sm">ShieldScan Conversational AI</h3>
          <p className="text-[10px] text-slate-400 font-semibold mt-0.5">RAG retrieval grounded in AWS Security Guidelines</p>
        </div>
        <span className="text-[9px] bg-brand/10 border border-brand/20 text-brand px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Online</span>
      </div>

      {/* Suggestion Chips */}
      <div className="px-5 py-2.5 border-b border-slate-50 flex flex-wrap gap-2 flex-shrink-0 bg-slate-50/50">
        {SUGGESTION_CHIPS.map((chip) => (
          <button key={chip} onClick={() => send(chip)}
            className="text-[10px] font-bold px-2.5 py-1 bg-white hover:bg-slate-100 border border-slate-200 text-slate-500 rounded-lg transition-colors">
            {chip}
          </button>
        ))}
      </div>

      {/* Conversation Thread */}
      <div className="flex-1 overflow-y-auto p-5 scrollbar min-h-0 bg-slate-50/20">
        {msgs.map((m, i) => (
          <div key={i} className={`flex gap-3 mb-4.5 ${m.role === "assistant" ? "" : "flex-row-reverse"}`}>
            <div className={`w-8 h-8 rounded-xl flex-shrink-0 flex items-center justify-center font-bold text-xs shadow-sm
              ${m.role === "assistant" ? "bg-brand text-white border border-brand/10" : "bg-slate-200 text-slate-600"}`}>
              {m.role === "assistant" ? "AI" : "Me"}
            </div>
            <div className={`max-w-[75%] rounded-2xl px-4 py-3 text-xs leading-relaxed shadow-sm border
              ${m.role === "assistant" ? "bg-white text-slate-700 border-slate-100" : "bg-brand text-white border-brand/20"}`}>
              <pre className="whitespace-pre-wrap font-sans text-xs leading-relaxed">{m.content}</pre>
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex gap-3 mb-4.5 items-center">
            <div className="w-8 h-8 rounded-xl bg-brand flex items-center justify-center text-xs font-bold text-white shadow-sm">AI</div>
            <div className="flex items-center gap-2 bg-white rounded-2xl px-4 py-2 border border-slate-100 shadow-sm">
              <Spinner sz={3.5}/><span className="text-xs text-slate-400 font-semibold animate-pulse">AI is parsing context guidelines...</span>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Text Area Input */}
      <div className="px-5 py-3 border-t border-slate-100 flex gap-3 flex-shrink-0 bg-white rounded-b-xl">
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter") send();}}
          placeholder="Ask anything about security posture remediation..."
          className="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:border-brand focus:ring-4 focus:ring-brand/5 transition-all"/>
        <button onClick={() => send()} disabled={loading || !input.trim()}
          className="px-5 py-2.5 bg-brand hover:bg-brand-hover text-white text-xs font-bold rounded-xl transition-all shadow-md">
          Send Prompt
        </button>
      </div>
    </div>
  );
}

  // fetchWithAuth wrapper
  const fetchWithAuth = useCallback(async (path, options = {}) => {
    try {
      return await apiFetch(path, options, token);
    } catch(err) {
      if (err.message === "UNAUTHORIZED") {
        onLogout();
      }
      throw err;
    }
  }, [token, onLogout]);

  // Load findings from DB or mock fallback
  const loadFindings = useCallback(async () => {
    try {
      const data = await fetchWithAuth("/api/scan/findings");
      if (data.findings && data.findings.length > 0) {
        setFindings(data.findings);
        setStats({
          total: data.total,
          critical: data.critical,
          high: data.high,
          medium: data.medium,
          low: data.low,
          risk_score: data.risk_score
        });
      } else {
        // Returned empty - load mock
        setFindings(MOCK_FINDINGS);
        setStats(MOCK_STATS);
      }
    } catch(err) {
      // Failed - load mock
      setFindings(MOCK_FINDINGS);
      setStats(MOCK_STATS);
      showToast("Cannot connect to SQLite server. Showing offline Mock Data.", "warning");
    }
  }, [fetchWithAuth]);

  // Load User Profile
  const loadProfile = useCallback(async () => {
    try {
      const data = await fetchWithAuth("/api/auth/me");
      setProfile(data);
    } catch(err) {}
  }, [fetchWithAuth]);

  useEffect(() => {
    loadProfile();
    loadFindings();
  }, [loadProfile, loadFindings]);

  // Trigger scan execution
  const executeScan = async () => {
    setScanning(true);
    try {
      const res = await fetchWithAuth("/api/scan/run", { method: "POST" });
      setFindings(res.findings || []);
      setStats({
        total: res.total,
        critical: res.critical,
        high: res.high,
        medium: res.medium,
        low: res.low,
        risk_score: res.risk_score
      });
      showToast("Security scan run completed successfully.", "success");
    } catch(err) {
      showToast(err.message || "Live scan execution failed. Using mock scans.");
      // fallback scan trigger
      await new Promise(r => setTimeout(r, 1500));
      setFindings(MOCK_FINDINGS);
      setStats(MOCK_STATS);
    } finally {
      setScanning(false);
    }
  };

  const handleFindingsAskAI = (remedyText) => {
    setPreChatText(remedyText);
    setIsPreChatTriggered(true);
  };

  return (
    <div className="flex h-screen overflow-hidden bg-slate-50">
      {/* Toast notifications */}
      {toasts.map(t => (
        <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)}/>
      ))}

      {/* Sidebar Navigation */}
      <aside className={`bg-brand text-white flex flex-col h-full transition-all duration-300 flex-shrink-0 select-none
        ${sidebarCollapsed ? "w-16" : "w-60"}`}>
        <div className="px-5 py-4 border-b border-white/10 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-3 overflow-hidden">
            <span className="text-2xl leading-none">🛡️</span>
            {!sidebarCollapsed && (
              <div>
                <p className="font-extrabold text-sm leading-tight tracking-wider">ShieldScan</p>
                <p className="text-[10px] text-brand-light/70 font-semibold tracking-widest uppercase">CNAPP System</p>
              </div>
            )}
          </div>
          <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)} className="text-white/60 hover:text-white hidden sm:block">
            {sidebarCollapsed ? "→" : "←"}
          </button>
        </div>
        
        <nav className="flex-1 p-3 overflow-y-auto scrollbar">
          {NAV_GROUPS.map((g) => (
            <div key={g.group} className="mb-5">
              {!sidebarCollapsed && (
                <p className="text-[9px] font-bold text-brand-light/50 uppercase tracking-widest px-2.5 mb-2">{g.group}</p>
              )}
              {g.items.map((item) => (
                <button key={item.id} onClick={() => setCurrentTab(item.id)}
                  className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-xs font-bold tracking-wide transition-all mb-1 select-none
                    ${currentTab === item.id 
                      ? "bg-white/15 text-white shadow" 
                      : "text-brand-light/75 hover:bg-white/5 hover:text-white"}`}
                  title={item.label}>
                  <span className="text-sm leading-none">{item.icon}</span>
                  {!sidebarCollapsed && <span className="truncate">{item.label}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>

        {/* User Card */}
        <div className="p-3 border-t border-white/10 flex-shrink-0 bg-brand-hover">
          <div className="flex items-center gap-3 overflow-hidden">
            <div className="w-8 h-8 rounded-xl bg-white/15 border border-white/10 flex items-center justify-center font-extrabold text-white text-xs select-none">
              {((profile.full_name || profile.email || "U")[0]).toUpperCase()}
            </div>
            {!sidebarCollapsed && (
              <div className="min-w-0 flex-1">
                <p className="text-xs font-bold truncate leading-tight">{profile.full_name || "User Account"}</p>
                <p className="text-[9px] text-brand-light/65 truncate font-semibold mt-0.5">{profile.email}</p>
              </div>
            )}
          </div>
        </div>
      </aside>

      {/* Main Panel */}
      <div className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        {/* Top Header */}
        <header className="flex-shrink-0 flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200/80 shadow-sm z-10">
          <div>
            <h1 className="text-base font-extrabold text-slate-800 tracking-tight">
              {NAV_GROUPS.flatMap(g => g.items).find(i => i.id === currentTab)?.label || "Overview"}
            </h1>
          </div>
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-200/60 rounded-lg px-2.5 py-1.5 select-none">
              <span className={`w-2 h-2 rounded-full ${profile.aws_connected ? 'bg-emerald-500' : 'bg-amber-500'} inline-block`}></span>
              {profile.aws_connected ? "AWS Live Connected" : "AWS Offline mode"}
            </div>
            <button onClick={onLogout}
              className="px-3 py-1.5 border border-slate-200 text-[10px] font-bold text-slate-500 hover:text-slate-700 rounded-lg hover:bg-slate-50 transition-colors select-none">
              Sign out
            </button>
          </div>
        </header>

        {/* Dynamic Views */}
        <main className="flex-1 overflow-y-auto scrollbar p-6 min-h-0">
          {currentTab === "dashboard"  && <DashboardPage stats={stats} findings={findings} onAskAI={handleFindingsAskAI} scanning={scanning} runScan={executeScan}/>}
          {currentTab === "findings"   && <FindingsPage findings={findings} onAskAI={handleFindingsAskAI} fetchWithAuth={fetchWithAuth} showToast={showToast}/>}
          {currentTab === "cspm"       && <CSPMPage findings={findings}/>}
          {currentTab === "cwpp"       && <CWPPPage findings={findings}/>}
          {currentTab === "compliance" && <CompliancePage/>}
          {currentTab === "inventory"  && <InventoryPage/>}
          {currentTab === "reports"    && <ReportsPage findings={findings} stats={stats} showToast={showToast}/>}
          {currentTab === "ai"         && <div className="h-[calc(100vh-140px)]"><AIAssistantPage fetchWithAuth={fetchWithAuth} showToast={showToast}/></div>}
          {currentTab === "settings"   && <SettingsPage userProfile={profile} onUpdateProfile={setProfile} showToast={showToast} fetchWithAuth={fetchWithAuth}/>}
        </main>
      </div>

      {/* Floating Chat Widget */}
      <FloatWidget fetchWithAuth={fetchWithAuth} showToast={showToast}
        isPreloaded={isPreChatTriggered} preloadedText={preChatText} clearPreload={() => { setPreChatText(null); setIsPreChatTriggered(false); }}/>
    </div>
  );
}

// ── ROOT ELEMENT ─────────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(null); // JWT token purely in state
  const [authPage, setAuthPage] = useState("login");
  const [toasts, setToasts] = useState([]);

  const showToast = (message) => {
    const id = Date.now();
    setToasts(p => [...p, { id, message }]);
  };

  const removeToast = (id) => {
    setToasts(p => p.filter(t => t.id !== id));
  };

  if (!token) {
    return (
      <div className="relative">
        {toasts.map(t => (
          <Toast key={t.id} message={t.message} type="error" onClose={() => removeToast(t.id)}/>
        ))}
        {authPage === "login" ? (
          <LoginPage onLogin={setToken} onGoSignup={() => setAuthPage("signup")} showToast={showToast}/>
        ) : (
          <SignupPage onSignup={setToken} onGoLogin={() => setAuthPage("login")} showToast={showToast}/>
        )}
      </div>
    );
  }

  return <MainApp token={token} onLogout={() => setToken(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
