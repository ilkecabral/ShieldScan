  return n >= 80 ? "#dc2626" : n >= 65 ? "#ea580c" : n >= 50 ? "#ca8a04" : "#16a34a";

// ── Atoms ─────────────────────────────────────────────────────────────────────

);

const SvcBadge = ({ s }) => {

const RiskGauge = ({ score }) => {
  const color = riskColor(score);
  const label = score < 50 ? "Critical" : score < 65 ? "High Risk" : score < 80 ? "Medium" : "Low Risk";
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-4 flex flex-col items-center justify-center min-h-[90px]">

// ── Auth Pages ─────────────────────────────────────────────────────────────────

function LoginPage({ onLogin, onGoSignup }) {
  const [email, setEmail] = useState("");
  const [pwd, setPwd] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const submit = async (e) => {
    e.preventDefault(); setErr("");
    if (!email || !pwd) { setErr("Please fill in all fields."); return; }
    setLoading(true);
    await new Promise(r => setTimeout(r, 700));
    setLoading(false);
    onLogin({ email, name: email.split("@")[0] });
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-[#0F6E56] to-teal-800 flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="text-6xl mb-3">&#128737;&#65039;</div>
          <h1 className="text-3xl font-bold text-white">ShieldScan</h1>
          <p className="text-teal-200 mt-1 text-sm">Cloud-Native Application Protection Platform</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-8">
          <h2 className="text-lg font-semibold text-gray-800 mb-5">Sign in to your account</h2>
          {err && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}
          <form onSubmit={submit} className="space-y-4">
            <div>
              <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
                className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-50"/>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Password</label>
              <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="........"
                className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-50"/>
            </div>
            <button type="submit" disabled={loading}
              className="w-full py-2.5 bg-[#0F6E56] text-white text-sm font-semibold rounded-lg hover:bg-teal-700 disabled:opacity-60 transition-colors flex items-center justify-center gap-2">
              {loading && <Spinner sz={4}/>}{loading ? "Signing in..." : "Sign in"}
            </button>
          </form>
          <div className="relative my-5">
            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-100"/></div>
            <div className="relative flex justify-center"><span className="px-3 bg-white text-xs text-gray-400">or</span></div>
          </div>
          <button onClick={() => onLogin({ email:"demo@epita.fr", name:"Demo User" })}
            className="w-full py-2.5 border-2 border-[#0F6E56] text-[#0F6E56] text-sm font-semibold rounded-lg hover:bg-teal-50 transition-colors">
            Continue with Demo Mode
          </button>
          <p className="text-center text-xs text-gray-400 mt-6">
            No account?{" "}
            <button onClick={onGoSignup} className="text-[#0F6E56] font-semibold hover:underline">Create one</button>
          </p>
        </div>
      </div>
    </div>
  );
}

function SignupPage({ onSignup, onGoLogin }) {
  const [f, setF] = useState({ name:"", email:"", org:"", pwd:"", confirm:"" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const set = k => e => setF(p => ({...p, [k]: e.target.value}));

  const submit = async (e) => {
    e.preventDefault(); setErr("");
    if (!f.name || !f.email || !f.pwd) { setErr("Fill in all required fields."); return; }
    if (f.pwd !== f.confirm) { setErr("Passwords do not match."); return; }
    if (f.pwd.length < 8) { setErr("Password must be at least 8 characters."); return; }
    setLoading(true);
    await new Promise(r => setTimeout(r, 900));
    setLoading(false);
    onSignup({ email: f.email, name: f.name });
  };

  const Field = ({ label, k, type="text", ph, req }) => (
    <div>
      <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">
        {label}{req && <span className="text-red-400 ml-0.5">*</span>}
      </label>
      <input type={type} value={f[k]} onChange={set(k)} placeholder={ph}
        className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-50"/>
    </div>
  );

  return (
    <div className="min-h-screen bg-gradient-to-br from-[#0F6E56] to-teal-800 flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="text-6xl mb-3">&#128737;&#65039;</div>
          <h1 className="text-3xl font-bold text-white">ShieldScan</h1>
          <p className="text-teal-200 mt-1 text-sm">Create your account</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-8">
          <h2 className="text-lg font-semibold text-gray-800 mb-5">Create account</h2>
          {err && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}
          <form onSubmit={submit} className="space-y-4">
            <Field label="Full name" k="name" ph="Kiran Reddy" req/>
            <Field label="Email" k="email" type="email" ph="you@example.com" req/>
            <Field label="Organisation" k="org" ph="EPITA / Startup"/>
            <Field label="Password" k="pwd" type="password" ph="Min. 8 characters" req/>
            <Field label="Confirm Password" k="confirm" type="password" ph="Repeat password" req/>
            <button type="submit" disabled={loading}
              className="w-full py-2.5 bg-[#0F6E56] text-white text-sm font-semibold rounded-lg hover:bg-teal-700 disabled:opacity-60 transition-colors flex items-center justify-center gap-2">
              {loading && <Spinner sz={4}/>}{loading ? "Creating account..." : "Create account"}
            </button>
          </form>
          <p className="text-center text-xs text-gray-400 mt-6">
            Already have an account?{" "}
            <button onClick={onGoLogin} className="text-[#0F6E56] font-semibold hover:underline">Sign in</button>
          </p>
        </div>
      </div>
    </div>
  );
}

// ── AWS Connect Wizard ─────────────────────────────────────────────────────────

function AWSConnect({ onConnected }) {
  const [step, setStep] = useState(1);
  const [method, setMethod] = useState("keys");
  const [creds, setCreds] = useState({ ak:"", sk:"", token:"", roleArn:"" });
  const [regions, setRegions] = useState(["us-east-1"]);
  const [testing, setTesting] = useState(false);
  const set = k => e => setCreds(c=>({...c,[k]:e.target.value}));
  const ALL_REGIONS = ["us-east-1","us-east-2","us-west-1","us-west-2","eu-west-1","eu-west-2","eu-central-1","ap-southeast-1","ap-northeast-1"];

  const testConn = async () => {
    setTesting(true);
    await new Promise(r => setTimeout(r, 1400));
    setTesting(false); setStep(3);
  };

  const toggleRegion = r => setRegions(p => p.includes(r) ? p.filter(x=>x!==r) : [...p,r]);

  return (
    <div className="max-w-2xl">
      <h2 className="text-base font-semibold text-gray-800 mb-0.5">Connect AWS Account</h2>
      <p className="text-sm text-gray-400 mb-6">Add credentials to enable live CSPM scanning via boto3.</p>

      <div className="flex items-center gap-2 mb-8">
        {["Credentials","Regions","Verify"].map((s, i) => (
          <React.Fragment key={s}>
            <div className="flex items-center gap-2">
              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border-2 transition-all
                ${i+1 < step ? "bg-[#0F6E56] border-[#0F6E56] text-white"
                  : i+1 === step ? "border-[#0F6E56] text-[#0F6E56]"
                  : "border-gray-200 text-gray-300"}`}>{i+1}</div>
              <span className={`text-xs font-medium ${i+1 <= step ? "text-[#0F6E56]" : "text-gray-300"}`}>{s}</span>
            </div>
            {i < 2 && <div className={`flex-1 h-px ${i+1 < step ? "bg-[#0F6E56]" : "bg-gray-200"}`}/>}
          </React.Fragment>
        ))}
      </div>

      <div className="bg-white rounded-xl border border-gray-200 p-6">
        {step === 1 && (
          <div className="space-y-4">
            <div className="flex gap-3 mb-2">
              {[["keys","Access Keys"],["role","IAM Role ARN"]].map(([v,lbl]) => (
                <button key={v} onClick={()=>setMethod(v)}
                  className={`flex-1 py-2 text-sm font-medium rounded-lg border-2 transition-colors
                    ${method===v ? "border-[#0F6E56] text-[#0F6E56] bg-teal-50" : "border-gray-200 text-gray-500 hover:bg-gray-50"}`}>
                  {lbl}
                </button>
              ))}
            </div>
            {method === "keys" ? (
              <>
                <div>
                  <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">AWS Access Key ID <span className="text-red-400">*</span></label>
                  <input value={creds.ak} onChange={set("ak")} placeholder="AKIAIOSFODNN7EXAMPLE"
                    className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-teal-400"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">AWS Secret Access Key <span className="text-red-400">*</span></label>
                  <input type="password" value={creds.sk} onChange={set("sk")} placeholder="................"
                    className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-teal-400"/>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">Session Token <span className="text-gray-300">(optional)</span></label>
                  <input value={creds.token} onChange={set("token")} placeholder="AQoDYXdz... (for temporary credentials)"
                    className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-teal-400"/>
                </div>
              </>
            ) : (
              <div>
                <label className="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1.5">IAM Role ARN <span className="text-red-400">*</span></label>
                <input value={creds.roleArn} onChange={set("roleArn")} placeholder="arn:aws:iam::123456789012:role/ShieldScanRole"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:border-teal-400"/>
                <p className="text-xs text-gray-400 mt-2">Role must have AWS-managed <code className="bg-gray-100 px-1 rounded">SecurityAudit</code> policy attached.</p>
              </div>
            )}
            <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700 flex gap-2">
              <span>&#128274;</span>
              <span>Credentials are stored encrypted. ShieldScan only uses read-only AWS APIs - no write access.</span>
            </div>
            <button onClick={()=>setStep(2)}
              className="w-full py-2.5 bg-[#0F6E56] text-white text-sm font-semibold rounded-lg hover:bg-teal-700 transition-colors">
              Continue
            </button>
          </div>
        )}

        {step === 2 && (
          <div className="space-y-4">
            <p className="text-sm text-gray-500">Select AWS regions to scan. More regions = longer scan time (~2 min each).</p>
            <div className="grid grid-cols-3 gap-2">
              {ALL_REGIONS.map(r => (
                <button key={r} onClick={()=>toggleRegion(r)}
                  className={`px-3 py-2 text-xs rounded-lg border-2 font-mono transition-colors
                    ${regions.includes(r) ? "border-[#0F6E56] bg-teal-50 text-teal-700" : "border-gray-200 text-gray-500 hover:bg-gray-50"}`}>
                  {r}
                </button>
              ))}
            </div>
            <p className="text-xs text-gray-400">{regions.length} region{regions.length!==1?"s":""} selected</p>
            <div className="flex gap-3">
              <button onClick={()=>setStep(1)} className="flex-1 py-2.5 border border-gray-200 text-sm font-medium rounded-lg hover:bg-gray-50">Back</button>
              <button onClick={testConn} disabled={testing || regions.length===0}
                className="flex-1 py-2.5 bg-[#0F6E56] text-white text-sm font-semibold rounded-lg hover:bg-teal-700 disabled:opacity-60 flex items-center justify-center gap-2">
                {testing ? <><Spinner sz={4}/> Testing connection...</> : "Test and Connect"}
              </button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="text-center py-4 space-y-5">
            <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl mx-auto">&#9989;</div>
            <div>
              <p className="font-semibold text-gray-800">AWS account connected successfully</p>
              <p className="text-sm text-gray-400 mt-1">Account: 123456789012 · {regions.slice(0,3).join(", ")}{regions.length>3?" +"+String(regions.length-3)+" more":""}</p>
            </div>
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div className="bg-gray-50 rounded-lg p-3 text-left">
                <p className="text-xs text-gray-400">Permission level</p>
                <p className="font-medium text-gray-700 mt-0.5">Read-only (SecurityAudit)</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-3 text-left">
                <p className="text-xs text-gray-400">Connected</p>
                <p className="font-medium text-gray-700 mt-0.5">{new Date().toLocaleDateString()}</p>
              </div>
            </div>
            <button onClick={onConnected}
              className="w-full py-2.5 bg-[#0F6E56] text-white text-sm font-semibold rounded-lg hover:bg-teal-700 transition-colors">
              Go to Dashboard
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Chat hook ─────────────────────────────────────────────────────────────────

function useChat(init) {
  const [msgs, setMsgs] = useState([{ role:"assistant", content:init }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);

  const send = useCallback(async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    setMsgs(p => [...p, { role:"user", content:q }]);
    setInput("");
    setLoading(true);
    try {
      const res = await fetch(API + "/api/ai/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ question:q, user_id:"demo" }),
      });
      const d = await res.json();
      setMsgs(p => [...p, { role:"assistant", content:d.response }]);
    } catch {
      setMsgs(p => [...p, { role:"assistant", content:"Backend offline. Run: python demo_backend.py" }]);
    }
    setLoading(false);
  }, [input, loading]);

  return { msgs, input, setInput, loading, send };
}

function ReportsPage({ findings, stats }) {
  const [pdfLoading, setPdfLoading] = useState(false);

  const downloadCSV = () => {
    const headers = ["ID","Resource","Resource Type","Region","Finding","Severity","Service","Risk Score","CIS Control","Remediation"];
    const rows = findings.map(f => [
      f.id, '"'+f.resource+'"', f.resource_type, f.region,
      '"'+f.finding+'"', f.severity, f.service, f.risk_score,
      f.cis_control, '"'+f.remediation+'"'
    ]);
    const csv = [headers].concat(rows).map(r=>r.join(",")).join("\n");
    const url = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a = document.createElement("a");
    a.href = url;
    a.download = "shieldscan-"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  const downloadJSON = () => {
    const report = {
      generated_at: new Date().toISOString(),
      account_id: "123456789012",
      risk_score: stats.risk_score,
      summary: { total:stats.total, critical:stats.critical, high:stats.high, medium:stats.medium },
      findings: findings,
    };
    const url = URL.createObjectURL(new Blob([JSON.stringify(report,null,2)],{type:"application/json"}));
    const a = document.createElement("a");
    a.href = url;
    a.download = "shieldscan-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
  };

// ── Main App ──────────────────────────────────────────────────────────────────

const PAGE_TITLE = {
  dashboard:"Dashboard", findings:"Findings", cspm:"CSPM",
  cwpp:"CWPP", compliance:"Compliance", inventory:"Inventory",
  reports:"Reports & Export", ai:"AI Assistant", settings:"Settings",
};

function MainApp({ user }) {
  const [view, setView] = useState("dashboard");
  const [findings, setFindings] = useState([]);
  const [stats, setStats] = useState({ total:0, critical:0, high:0, medium:0, low:0, risk_score:0 });
  const [backendErr, setBackendErr] = useState(false);
  const [ready, setReady] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [lastScan, setLastScan] = useState(null);
  const [expanded, setExpanded] = useState(null);
  const [tips, setTips] = useState({});
  const [tipLoading, setTipLoading] = useState({});

  const load = useCallback(() => {
    fetch(API + "/api/scan/findings")
      .then(r=>r.json())
      .then(d => {
        setFindings(d.findings||[]);
        setStats({ total:d.total, critical:d.critical, high:d.high, medium:d.medium, low:d.low||0, risk_score:d.risk_score });
        setLastScan(new Date().toLocaleTimeString());
        setReady(true); setBackendErr(false);
      })
      .catch(()=>{ setBackendErr(true); setReady(true); });
  }, []);

  useEffect(()=>{ load(); },[load]);

  const runScan = async () => {
    setScanning(true);
    await new Promise(r=>setTimeout(r, 1800));
    load(); setScanning(false);
  };

  const getInlineTip = async (f) => {
    if (expanded===f.id) { setExpanded(null); return; }
    setExpanded(f.id);
    if (tips[f.id]) return;
    setTipLoading(p=>({...p,[f.id]:true}));
    try {
      const res = await fetch(API + "/api/ai/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          question:"Give a numbered 3-step remediation for finding "+f.id+": \""+f.finding+"\" on resource \""+f.resource+"\". Be concise and specific.",
          user_id:"demo"
        }),
      });
      const d = await res.json();
      setTips(p=>({...p,[f.id]:d.response}));
    } catch {
      setTips(p=>({...p,[f.id]:"Backend offline - run python demo_backend.py"}));
    }
    setTipLoading(p=>({...p,[f.id]:false}));
  };

  const showScanBtn = !["settings","ai"].includes(view);

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar view={view} setView={setView} user={user}/>
      <div className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        <TopBar title={PAGE_TITLE[view]} lastScan={showScanBtn ? lastScan : null}
          onScan={showScanBtn ? runScan : null} scanning={scanning}/>

        {backendErr && (
          <div className="mx-6 mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 flex-shrink-0">
            Cannot reach localhost:8000 - run <code className="font-mono bg-red-100 px-1 rounded">python demo_backend.py</code> then refresh.
          </div>
        )}

        <main className="flex-1 overflow-y-auto scrollbar p-6 min-h-0">
          {!ready ? (
            <div className="flex items-center justify-center h-48 gap-2 text-gray-400">
              <Spinner/><span className="text-sm">Loading scan data...</span>
            </div>
          ) : (
            <div>
              {view==="dashboard"  && <Dashboard findings={findings} stats={stats} onTip={getInlineTip} tips={tips} tipLoading={tipLoading} expanded={expanded}/>}
              {view==="findings"   && <FindingsTable findings={findings} onTip={getInlineTip} tips={tips} tipLoading={tipLoading} expanded={expanded}/>}
              {view==="cspm"       && <CSPMPage findings={findings}/>}
              {view==="cwpp"       && <CWPPPage findings={findings}/>}
              {view==="compliance" && <CompliancePage/>}
              {view==="inventory"  && <InventoryPage/>}
              {view==="reports"    && <ReportsPage findings={findings} stats={stats}/>}
              {view==="ai"         && <div style={{height:"calc(100vh - 140px)"}}><AIAssistant/></div>}
              {view==="settings"   && <SettingsPage user={user} goToView={setView}/>}
            </div>
          )}
        </main>
      </div>
      <FloatWidget/>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────

function App() {
  const [authPage, setAuthPage] = useState("login");
  const [user, setUser] = useState(null);

  if (!user) {
    if (authPage === "login") {
      return React.createElement(LoginPage, { onLogin:setUser, onGoSignup:()=>setAuthPage("signup") });
    }
    return React.createElement(SignupPage, { onSignup:setUser, onGoLogin:()=>setAuthPage("login") });
  }
  return React.createElement(MainApp, { user:user });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
